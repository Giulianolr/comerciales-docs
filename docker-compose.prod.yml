version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: comerciales-db
    environment:
      POSTGRES_DB: ${DB_NAME:-comerciales}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comerciales

  redis:
    image: redis:7-alpine
    container_name: comerciales-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comerciales

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comerciales-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-comerciales}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: 60
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - comerciales
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: comerciales-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/opt/comerciales/frontend:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - fastapi
    networks:
      - comerciales
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  comerciales:
    driver: bridge
